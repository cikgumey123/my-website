<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pecahan Cikgu Mey</title>
  <!-- Import Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- CSS Tambahan (Animasi & Scrollbar) -->
  <style>
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in-up {
      animation: fadeInUp 0.5s ease-out forwards;
    }
    /* Custom Scrollbar untuk paparan dalam slide */
    .slide-scroll::-webkit-scrollbar {
      width: 8px;
    }
    .slide-scroll::-webkit-scrollbar-track {
      background: transparent; 
    }
    .slide-scroll::-webkit-scrollbar-thumb {
      background: rgba(236, 72, 153, 0.4); 
      border-radius: 10px;
    }
    .slide-scroll::-webkit-scrollbar-thumb:hover {
      background: rgba(236, 72, 153, 0.8); 
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-cyan-100 via-pink-100 to-yellow-100 font-sans text-gray-800 p-2 md:p-8 selection:bg-pink-300 selection:text-white">

  <!-- Bekas Slide 16:9 (Presentation Wrapper) -->
  <div class="w-full max-w-[1280px] aspect-auto md:aspect-video bg-white/90 backdrop-blur-xl rounded-3xl md:rounded-[2.5rem] shadow-2xl border-4 md:border-8 border-white flex flex-col overflow-hidden relative">
    
    <!-- Tempat Bar Navigasi dirender -->
    <div id="nav-container"></div>
    
    <!-- Tempat Kandungan Utama dirender -->
    <main id="main-content" class="flex-1 overflow-y-auto slide-scroll pb-12 relative"></main>
    
  </div>

  <!-- Skrip Utama (Vanilla JS) -->
  <script>
    // --- State Aplikasi ---
    let page = 'intro';
    let contohAras = 1;
    let contohStep = 0;
    let latihanAras = 1;
    let showAnswer = {};

    // --- Komponen Bantuan (Helper Functions) ---

    // Komponen untuk memaparkan Pecahan (Fraction)
    function Frac(whole = '', num = '', den = '', numColor = 'text-gray-800', denColor = 'text-gray-800', wholeColor = 'text-gray-800') {
      let html = `<div class="flex items-center text-2xl md:text-4xl font-bold mx-1 select-none">`;
      if (whole) {
        html += `<span class="mr-1 ${wholeColor}">${whole}</span>`;
      }
      if (num || den) {
        html += `
          <div class="flex flex-col items-center justify-center min-w-[1.5rem]">
            <span class="px-1 text-[0.8em] ${numColor}">${num}</span>
            <div class="w-full h-[3px] bg-gray-800 rounded-full my-[2px]"></div>
            <span class="px-1 text-[0.8em] ${denColor}">${den}</span>
          </div>
        `;
      }
      html += `</div>`;
      return html;
    }

    // Komponen Simbol Operasi
    const Op = (char, color = 'text-pink-500') => `<span class="text-2xl md:text-4xl font-black mx-2 ${color} select-none">${char}</span>`;

    // Komponen Tanda Sama Dengan
    const Eq = () => `<span class="text-2xl md:text-4xl font-black mx-3 text-purple-500 select-none">=</span>`;

    // Komponen Nota Langkah
    const Note = (text) => `
      <div class="flex items-center justify-center my-3 w-full">
        <div class="bg-yellow-200 text-yellow-800 px-4 py-2 rounded-full text-sm font-bold shadow-sm animate-bounce border-2 border-yellow-400">
          💡 ${text}
        </div>
      </div>
    `;

    // --- Data ---
    const contohData = {
      1: {
        title: "Aras 1: Mudah (Penyebut Sama)",
        desc: "Fokus kepada ketepatan mengira pengangka secara terus.",
        steps: [
          { elem: `${Frac('','8','11')} ${Op('-')} ${Frac('','3','11')} ${Op('+')} ${Frac('','5','11')}`, note: "Soalan" },
          { elem: `${Eq()} ${Frac('', `8 ${Op('-','text-gray-800 text-sm')} 3 ${Op('+','text-gray-800 text-sm')} 5`, '11', 'text-blue-600')}`, note: "Gabungkan pengangka (atas). Penyebut (bawah) kekal 11." },
          { elem: `${Eq()} ${Frac('', `5 ${Op('+','text-gray-800 text-sm')} 5`, '11', 'text-blue-600')}`, note: "Tolak dahulu: 8 - 3 = 5" },
          { elem: `${Eq()} ${Frac('','10','11','text-green-600')}`, note: "Selesai! Jawapan wajar." }
        ]
      },
      2: {
        title: "Aras 2: Sederhana (Penyebut Berbeza)",
        desc: "Melibatkan penukaran satu penyebut agar selaras dengan yang lain.",
        steps: [
          { elem: `${Frac('','1','2')} ${Op('-')} ${Frac('','1','6')} ${Op('+')} ${Frac('','2','3')}`, note: "Soalan" },
          { elem: `${Eq()} ${Frac('', `1<span class="text-red-500 text-sm">×3</span>`, `2<span class="text-red-500 text-sm">×3</span>`)} ${Op('-')} ${Frac('','1','6')} ${Op('+')} ${Frac('', `2<span class="text-red-500 text-sm">×2</span>`, `3<span class="text-red-500 text-sm">×2</span>`)}`, note: "Samakan penyebut menjadi 6 dengan mendarab." },
          { elem: `${Eq()} ${Frac('','3','6','text-indigo-600','text-indigo-600')} ${Op('-')} ${Frac('','1','6')} ${Op('+')} ${Frac('','4','6','text-indigo-600','text-indigo-600')}`, note: "Penyebut sudah seragam." },
          { elem: `${Eq()} ${Frac('', `3 ${Op('-','text-gray-800 text-sm')} 1 ${Op('+','text-gray-800 text-sm')} 4`, '6')}`, note: "Gabungkan pengangka." },
          { elem: `${Eq()} ${Frac('', `2 ${Op('+','text-gray-800 text-sm')} 4`, '6')}`, note: "Kira dari kiri: 3 - 1 = 2" },
          { elem: `${Eq()} ${Frac('','6','6')}`, note: "Selesaikan pengangka." },
          { elem: `${Eq()} <span class="text-4xl font-bold text-green-600">1</span>`, note: "Permudahkan: 6/6 bersamaan 1." }
        ]
      },
      3: {
        title: "Aras 3: Sukar (Nombor Bulat & Bercampur)",
        desc: "Menguji kemahiran menukar unit nombor bulat kepada pecahan sebelum menolak.",
        steps: [
          { elem: `<span class="text-4xl font-bold mr-2">4</span> ${Op('-')} ${Frac('2','3','7')} ${Op('+')} ${Frac('','1','7')}`, note: "Soalan" },
          { elem: `${Eq()} ${Frac('3','7','7','text-blue-600','text-blue-600','text-blue-600')} ${Op('-')} ${Frac('2','3','7')} ${Op('+')} ${Frac('','1','7')}`, note: "Tukar 4 kepada nombor bercampur. Pinjam 1 jadi 3, dan baki 1 jadi pecahan 7/7." },
          { elem: `${Eq()} <span class="text-3xl font-bold">(3 ${Op('-','text-gray-800 text-sm')} 2)</span> ${Op('+')} <span class="text-3xl font-bold text-gray-500">(</span>${Frac('','7','7')} ${Op('-')} ${Frac('','3','7')} ${Op('+')} ${Frac('','1','7')}<span class="text-3xl font-bold text-gray-500">)</span>`, note: "Asingkan operasi nombor bulat dan pecahan." },
          { elem: `${Eq()} <span class="text-4xl font-bold text-green-600 mr-2">1</span> ${Op('+')} <span class="text-3xl font-bold text-gray-500">(</span>${Frac('', `7 ${Op('-','text-gray-800 text-sm')} 3 ${Op('+','text-gray-800 text-sm')} 1`, '7')}<span class="text-3xl font-bold text-gray-500">)</span>`, note: "Tolak nombor bulat: 3 - 2 = 1. Gabungkan pengangka pecahan." },
          { elem: `${Eq()} <span class="text-4xl font-bold text-green-600 mr-2">1</span> ${Op('+')} ${Frac('','5','7','text-blue-600')}`, note: "Selesaikan pecahan: 7 - 3 + 1 = 5." },
          { elem: `${Eq()} ${Frac('1','5','7','','','text-green-600')}`, note: "Cantumkan kembali nombor bulat dan pecahan. Selesai!" }
        ]
      }
    };

    const latihanData = {
      1: {
        title: "Latihan Aras 1: Mudah",
        fokus: "Memastikan murid faham konsep asas menambah dan menolak pengangka apabila penyebut sudah seragam.",
        soalan: [
          { q: `${Frac('','4','9')} ${Op('+')} ${Frac('','2','9')} ${Op('-')} ${Frac('','1','9')}`, ans: `${Eq()} ${Frac('','4 + 2 - 1','9')} ${Eq()} ${Frac('','5','9')}` },
          { q: `${Frac('','7','10')} ${Op('-')} ${Frac('','3','10')} ${Op('+')} ${Frac('','5','10')}`, ans: `${Eq()} ${Frac('','7 - 3 + 5','10')} ${Eq()} ${Frac('','9','10')}` },
          { q: `${Frac('','5','8')} ${Op('+')} ${Frac('','1','8')} ${Op('-')} ${Frac('','3','8')}`, ans: `${Eq()} ${Frac('','5 + 1 - 3','8')} ${Eq()} ${Frac('','3','8')}` }
        ]
      },
      2: {
        title: "Latihan Aras 2: Sederhana",
        fokus: "Murid perlu menukarkan penyebut kepada nilai yang sama sebelum menyelesaikan operasi.",
        soalan: [
          { q: `${Frac('','1','2')} ${Op('+')} ${Frac('','1','4')} ${Op('-')} ${Frac('','1','8')}`, ans: `${Eq()} ${Frac('','4','8')} ${Op('+')} ${Frac('','2','8')} ${Op('-')} ${Frac('','1','8')} ${Eq()} ${Frac('','4 + 2 - 1','8')} ${Eq()} ${Frac('','5','8')}` },
          { q: `${Frac('','5','6')} ${Op('-')} ${Frac('','1','3')} ${Op('+')} ${Frac('','1','6')}`, ans: `${Eq()} ${Frac('','5','6')} ${Op('-')} ${Frac('','2','6')} ${Op('+')} ${Frac('','1','6')} ${Eq()} ${Frac('','5 - 2 + 1','6')} ${Eq()} ${Frac('','4','6')} ${Eq()} ${Frac('','2','3','text-green-600','text-green-600')} <span class="text-sm font-bold text-red-500 ml-2">(Permudah!)</span>` },
          { q: `${Frac('','3','5')} ${Op('+')} ${Frac('','1','10')} ${Op('-')} ${Frac('','2','5')}`, ans: `${Eq()} ${Frac('','6','10')} ${Op('+')} ${Frac('','1','10')} ${Op('-')} ${Frac('','4','10')} ${Eq()} ${Frac('','6 + 1 - 4','10')} ${Eq()} ${Frac('','3','10')}` }
        ]
      },
      3: {
        title: "Latihan Aras 3: Sukar",
        fokus: "Menguji kemahiran menukar nombor bulat kepada pecahan atau menguruskan nombor bercampur.",
        soalan: [
          { q: `<span class="text-4xl font-bold mr-2">2</span> ${Op('+')} ${Frac('','3','5')} ${Op('-')} ${Frac('','1','5')}`, ans: `${Eq()} <span class="text-4xl font-bold mr-2">2</span> ${Op('+')} ${Frac('','2','5')} ${Eq()} ${Frac('2','2','5')}` },
          { q: `<span class="text-4xl font-bold mr-2">3</span> ${Op('-')} ${Frac('1','1','4')} ${Op('+')} ${Frac('','3','4')}`, ans: `${Eq()} ${Frac('2','4','4')} ${Op('-')} ${Frac('1','1','4')} ${Op('+')} ${Frac('','3','4')} <br/>${Eq()} <span class="text-2xl font-bold">(2-1)</span> ${Op('+')} <span class="text-2xl font-bold">(</span>${Frac('','4-1+3','4')}<span class="text-2xl font-bold">)</span> <br/>${Eq()} <span class="text-3xl font-bold">1</span> ${Op('+')} ${Frac('','6','4')} ${Eq()} <span class="text-3xl font-bold">1</span> ${Op('+')} ${Frac('1','2','4')} ${Eq()} ${Frac('2','2','4')} ${Eq()} ${Frac('2','1','2','text-green-600','text-green-600')}` },
          { q: `${Frac('1','1','2')} ${Op('+')} ${Frac('','1','6')} ${Op('-')} ${Frac('','2','3')}`, ans: `${Eq()} ${Frac('1','3','6')} ${Op('+')} ${Frac('','1','6')} ${Op('-')} ${Frac('','4','6')} <br/>${Eq()} ${Frac('1','4','6')} ${Op('-')} ${Frac('','4','6')} ${Eq()} <span class="text-4xl font-bold text-green-600">1</span>` }
        ]
      }
    };

    // --- Pemaparan Paparan (View Rendering) ---

    function renderNavBar() {
      const navItems = [
        { id: 'intro', label: '🏠 Utama' },
        { id: 'tips', label: '📚 Tips' },
        { id: 'contoh', label: '📝 Contoh' },
        { id: 'latihan', label: '🎯 Latihan' }
      ];

      return `
        <div class="flex flex-wrap justify-center gap-2 md:gap-4 p-4 bg-white/70 backdrop-blur-md sticky top-0 z-50 border-b-2 border-pink-100 shadow-sm">
          ${navItems.map(item => `
            <button
              onclick="window.setPage('${item.id}')"
              class="px-4 py-2 md:px-6 md:py-3 rounded-full font-bold text-sm md:text-lg transition-all duration-300 transform hover:scale-105 shadow-md ${
                page === item.id
                  ? 'bg-gradient-to-r from-pink-400 to-purple-500 text-white shadow-pink-300/50'
                  : 'bg-white text-gray-600 border-2 border-pink-100 hover:border-pink-300'
              }"
            >
              ${item.label}
            </button>
          `).join('')}
        </div>
      `;
    }

    function renderIntro() {
      return `
        <div class="flex flex-col items-center justify-center p-8 min-h-full py-12 md:py-20 text-center animate-fade-in-up">
          <div class="text-8xl mb-6 animate-bounce">👩‍🏫✨</div>
          <h1 class="text-5xl md:text-7xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-pink-500 via-purple-500 to-indigo-500 drop-shadow-sm mb-4">
            Hai Semua!
          </h1>
          <h2 class="text-3xl md:text-4xl font-bold text-gray-700 mb-8">
            Saya <span class="text-pink-500 underline decoration-wavy decoration-yellow-400">Cikgu Mey</span>
          </h2>
          <p class="text-xl md:text-2xl text-gray-600 mb-12 max-w-2xl bg-white p-6 rounded-3xl shadow-xl border-4 border-cyan-200">
            Jom belajar Menambah dan Menolak Pecahan dengan cara yang paling mudah, ceria dan menyeronokkan! Bersedia? 🚀
          </p>
          <button
            onclick="window.setPage('tips')"
            class="bg-gradient-to-r from-green-400 to-emerald-500 text-white text-2xl font-bold py-4 px-10 rounded-full shadow-[0_8px_0_rgb(4,120,87)] hover:shadow-[0_4px_0_rgb(4,120,87)] hover:translate-y-1 transition-all"
          >
            Jom Mula! 🌟
          </button>
        </div>
      `;
    }

    function renderTips() {
      const tipsList = [
        { icon: '👀', text: 'Pastikan penyebut (nombor di bawah) kesemua pecahan adalah SAMA.', color: 'bg-blue-100 border-blue-400' },
        { icon: '➕➖', text: 'Tambahkan atau tolak pengangka (nombor di atas) SAHAJA.', color: 'bg-pink-100 border-pink-400' },
        { icon: '🛑', text: 'JANGAN usik penyebut! Kekalkan nilainya.', color: 'bg-red-100 border-red-400' },
        { icon: '✅', text: 'Pastikan jawapan akhir dalam bentuk pecahan wajar yang termudah.', color: 'bg-green-100 border-green-400' },
        { icon: '🔄', text: 'Jika jawapan dalam pecahan tak wajar, TUKARKAN kepada nombor bercampur.', color: 'bg-purple-100 border-purple-400' }
      ];

      return `
        <div class="p-6 md:p-10 max-w-4xl mx-auto animate-fade-in-up">
          <h2 class="text-4xl md:text-5xl font-extrabold text-center mb-10 text-indigo-700 drop-shadow-sm">
            💡 Tips Emas Pecahan 💡
          </h2>
          <div class="grid gap-6">
            ${tipsList.map(tip => `
              <div class="flex items-center p-6 rounded-3xl shadow-lg border-b-8 transform transition hover:-translate-y-1 hover:scale-[1.02] ${tip.color}">
                <div class="text-5xl mr-6 bg-white p-4 rounded-full shadow-inner">${tip.icon}</div>
                <p class="text-xl md:text-2xl font-bold text-gray-800 leading-snug">${tip.text}</p>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }

    function renderContoh() {
      const currentData = contohData[contohAras];
      const totalSteps = currentData.steps.length;

      return `
        <div class="p-4 md:p-8 max-w-5xl mx-auto flex flex-col items-center animate-fade-in-up">
          <!-- Pilihan Aras -->
          <div class="flex bg-white rounded-full shadow-md p-2 mb-8 border-2 border-purple-200">
            ${[1, 2, 3].map(level => `
              <button
                onclick="window.setContohAras(${level})"
                class="px-6 py-2 rounded-full font-bold text-lg transition-colors ${
                  contohAras === level ? 'bg-purple-500 text-white' : 'text-gray-500 hover:bg-purple-100'
                }"
              >
                Aras ${level}
              </button>
            `).join('')}
          </div>

          <div class="text-center mb-6">
            <h3 class="text-3xl font-extrabold text-purple-700">${currentData.title}</h3>
            <p class="text-lg text-gray-600">${currentData.desc}</p>
          </div>

          <!-- Kawasan Paparan Jalan Kira -->
          <div class="w-full bg-white border-4 border-dashed border-cyan-300 rounded-3xl p-6 md:p-10 shadow-xl mb-8 min-h-[400px]">
            ${currentData.steps.slice(0, contohStep + 1).map((item, index) => `
              <div class="flex flex-col items-center mb-6 animate-fade-in-up">
                ${index > 0 ? Note(item.note) : ''}
                <div class="flex flex-wrap justify-center items-center p-4 rounded-2xl ${index === contohStep ? 'bg-cyan-50 border-2 border-cyan-200 scale-105 transition-transform' : ''}">
                  ${item.elem}
                </div>
              </div>
            `).join('')}
          </div>

          <!-- Butang Kawalan -->
          <div class="flex gap-4">
            ${contohStep > 0 ? `
              <button
                onclick="window.setContohStep(0)"
                class="bg-gray-200 text-gray-700 font-bold py-3 px-6 rounded-full hover:bg-gray-300 transition shadow"
              >
                🔄 Mula Semula
              </button>
            ` : ''}
            ${contohStep < totalSteps - 1 ? `
              <button
                onclick="window.nextContohStep()"
                class="bg-gradient-to-r from-blue-500 to-cyan-500 text-white font-extrabold text-xl py-3 px-8 rounded-full shadow-[0_6px_0_rgb(6,182,212)] hover:shadow-[0_3px_0_rgb(6,182,212)] hover:translate-y-1 transition-all"
              >
                Langkah Seterusnya ➡️
              </button>
            ` : `
              <div class="bg-yellow-400 text-yellow-900 font-extrabold text-xl py-3 px-8 rounded-full shadow-md animate-pulse">
                🎉 TAHNIAH! JAWAPAN TEPAT! 🎉
              </div>
            `}
          </div>
        </div>
      `;
    }

    function renderLatihan() {
      const currentData = latihanData[latihanAras];

      return `
        <div class="p-4 md:p-8 max-w-5xl mx-auto animate-fade-in-up">
          <!-- Menu Aras -->
          <div class="flex justify-center mb-8">
            <div class="inline-flex bg-white rounded-2xl shadow-md border-2 border-indigo-200 overflow-hidden">
              ${[1, 2, 3].map(level => `
                <button
                  onclick="window.setLatihanAras(${level})"
                  class="px-6 py-3 font-bold text-lg md:text-xl transition-colors ${
                    latihanAras === level ? 'bg-indigo-500 text-white' : 'text-indigo-600 hover:bg-indigo-50'
                  }"
                >
                  Aras ${level}
                </button>
              `).join('')}
            </div>
          </div>

          <div class="bg-white border-4 border-indigo-300 rounded-3xl p-6 md:p-8 shadow-xl">
            <h3 class="text-2xl md:text-3xl font-bold text-indigo-700 mb-2">${currentData.title}</h3>
            <p class="text-gray-600 mb-8 pb-4 border-b-2 border-indigo-100 font-medium">🎯 Fokus: ${currentData.fokus}</p>

            <div class="space-y-6">
              ${currentData.soalan.map((item, index) => `
                <div class="bg-indigo-50 rounded-2xl p-6 shadow-sm border border-indigo-100 flex flex-col items-center">
                  <div class="flex justify-center items-center w-full mb-4">
                    ${item.q}
                  </div>
                  
                  ${showAnswer[index] ? `
                    <div class="mt-4 p-4 w-full bg-white rounded-xl border-2 border-dashed border-green-300 flex flex-wrap justify-center items-center animate-fade-in-up gap-y-4">
                      ${item.ans}
                    </div>
                  ` : ''}

                  <button
                    onclick="window.toggleAnswer(${index})"
                    class="mt-4 px-6 py-2 rounded-full font-bold text-sm shadow transition-all ${
                      showAnswer[index]
                        ? 'bg-red-100 text-red-600 hover:bg-red-200'
                        : 'bg-green-400 text-white hover:bg-green-500'
                    }"
                  >
                    ${showAnswer[index] ? 'Tutup Jalan Kira 🙈' : 'Semak Jalan Kira 👀'}
                  </button>
                </div>
              `).join('')}
            </div>
          </div>
        </div>
      `;
    }

    // --- Kawalan Paparan Utama (Main Render Controller) ---
    function renderApp() {
      document.getElementById('nav-container').innerHTML = renderNavBar();
      
      const mainContent = document.getElementById('main-content');
      if (page === 'intro') {
        mainContent.innerHTML = renderIntro();
      } else if (page === 'tips') {
        mainContent.innerHTML = renderTips();
      } else if (page === 'contoh') {
        mainContent.innerHTML = renderContoh();
      } else if (page === 'latihan') {
        mainContent.innerHTML = renderLatihan();
      }
    }

    // --- Fungsi Pengendali Interaksi (Event Handlers) ---
    window.setPage = (newPage) => {
      page = newPage;
      renderApp();
    };

    window.setContohAras = (level) => {
      contohAras = level;
      contohStep = 0;
      renderApp();
    };

    window.nextContohStep = () => {
      contohStep++;
      renderApp();
    };

    window.setContohStep = (step) => {
      contohStep = step;
      renderApp();
    };

    window.setLatihanAras = (level) => {
      latihanAras = level;
      showAnswer = {}; // Reset jawapan bila tukar aras
      renderApp();
    };

    window.toggleAnswer = (index) => {
      showAnswer[index] = !showAnswer[index];
      renderApp();
    };

    // Mula aplikasi bila struktur DOM sedia ada
    document.addEventListener('DOMContentLoaded', () => {
      renderApp();
    });
  </script>

</body>
</html>
